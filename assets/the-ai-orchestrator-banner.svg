<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="The AI Orchestrator — banner">
  <defs>
    <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#1C1B19" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="280" fill="#F4EEE2"/>
  <rect width="1200" height="280" fill="url(#dots)"/>

  <!-- editorial double frame -->
  <rect x="24" y="24" width="1152" height="232" fill="none" stroke="#1C1B19" stroke-width="1"/>
  <rect x="32" y="32" width="1136" height="216" fill="none" stroke="#1C1B19" stroke-width="0.5"/>

  <!-- top label -->
  <text x="600" y="72" font-family="Courier New, monospace" font-size="12" fill="#8A8275" text-anchor="middle" letter-spacing="4">TOOL — STACKS  /  THE ARHAM WAY</text>

  <!-- title -->
  <text x="600" y="140" font-family="Georgia, serif" font-style="italic" font-size="54" fill="#1C1B19" text-anchor="middle">The AI Orchestrator</text>

  <!-- teal underline -->
  <line x1="540" y1="160" x2="660" y2="160" stroke="#539091" stroke-width="2"/>

  <!-- subtitle -->
  <text x="600" y="196" font-family="Georgia, serif" font-size="16" fill="#3A372F" text-anchor="middle">Not one AI. A cast of them — and knowing which one to hand the mic.</text>

  <!-- bottom label -->
  <text x="600" y="232" font-family="Courier New, monospace" font-size="11" fill="#8A8275" text-anchor="middle" letter-spacing="3">CLAUDE  ·  CLAUDE CODE  ·  KIMI  ·  STITCH  ·  GEMINI</text>
</svg>
