<svg viewBox="0 0 960 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Repo folder structure">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1C1B19" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="960" height="260" fill="#F4EEE2"/>
  <rect width="960" height="260" fill="url(#dots)"/>
  <rect x="10" y="10" width="940" height="240" fill="none" stroke="#1C1B19" stroke-width="0.5" opacity="0.10"/>

  <!-- ── ROW 1 ── -->

  <!-- philosophies/ -->
  <rect x="24"  y="24" width="293" height="96" rx="6" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1"/>
  <rect x="24"  y="24" width="5"   height="96" fill="#539091"/>
  <text x="42"  y="51" font-family="'Courier New',monospace" font-size="10" letter-spacing="2.5" fill="#8A8275">PHILOSOPHIES</text>
  <text x="42"  y="73" font-family="Georgia,serif"           font-size="16" fill="#1C1B19">Why I think this way</text>
  <text x="42"  y="96" font-family="'Courier New',monospace" font-size="12" fill="#6E6A62">beliefs · mindset shifts</text>

  <!-- playbooks/ -->
  <rect x="333" y="24" width="293" height="96" rx="6" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1"/>
  <rect x="333" y="24" width="5"   height="96" fill="#539091"/>
  <text x="351" y="51" font-family="'Courier New',monospace" font-size="10" letter-spacing="2.5" fill="#8A8275">PLAYBOOKS</text>
  <text x="351" y="73" font-family="Georgia,serif"           font-size="16" fill="#1C1B19">How I actually do it</text>
  <text x="351" y="96" font-family="'Courier New',monospace" font-size="12" fill="#6E6A62">step-by-step processes</text>

  <!-- case-studies/ -->
  <rect x="642" y="24" width="293" height="96" rx="6" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1"/>
  <rect x="642" y="24" width="5"   height="96" fill="#539091"/>
  <text x="660" y="51" font-family="'Courier New',monospace" font-size="10" letter-spacing="2.5" fill="#8A8275">CASE STUDIES</text>
  <text x="660" y="73" font-family="Georgia,serif"           font-size="16" fill="#1C1B19">Real projects, honestly</text>
  <text x="660" y="96" font-family="'Courier New',monospace" font-size="12" fill="#6E6A62">what worked · what broke</text>

  <!-- ── ROW 2 ── -->

  <!-- tool-stacks/ -->
  <rect x="24"  y="140" width="293" height="96" rx="6" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1"/>
  <rect x="24"  y="140" width="5"   height="96" fill="#539091"/>
  <text x="42"  y="167" font-family="'Courier New',monospace" font-size="10" letter-spacing="2.5" fill="#8A8275">TOOL STACKS</text>
  <text x="42"  y="189" font-family="Georgia,serif"           font-size="16" fill="#1C1B19">What I build with</text>
  <text x="42"  y="212" font-family="'Courier New',monospace" font-size="12" fill="#6E6A62">tools · when to use each</text>

  <!-- career/ -->
  <rect x="333" y="140" width="293" height="96" rx="6" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1"/>
  <rect x="333" y="140" width="5"   height="96" fill="#539091"/>
  <text x="351" y="167" font-family="'Courier New',monospace" font-size="10" letter-spacing="2.5" fill="#8A8275">CAREER</text>
  <text x="351" y="189" font-family="Georgia,serif"           font-size="16" fill="#1C1B19">Lessons from the journey</text>
  <text x="351" y="212" font-family="'Courier New',monospace" font-size="12" fill="#6E6A62">student advice · what compounds</text>

  <!-- field-notes/ -->
  <rect x="642" y="140" width="293" height="96" rx="6" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1"/>
  <rect x="642" y="140" width="5"   height="96" fill="#539091"/>
  <text x="660" y="167" font-family="'Courier New',monospace" font-size="10" letter-spacing="2.5" fill="#8A8275">FIELD NOTES</text>
  <text x="660" y="189" font-family="Georgia,serif"           font-size="16" fill="#1C1B19">Small wins, logged daily</text>
  <text x="660" y="212" font-family="'Courier New',monospace" font-size="12" fill="#6E6A62">TIL-style entries</text>
</svg>
