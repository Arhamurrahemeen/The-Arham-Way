<svg role="img" aria-label="Three questions to decide whether to open a spec doc" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <pattern id="dots3" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#1C1B19" fill-opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="420" fill="#F4EEE2"/>
  <rect width="1200" height="420" fill="url(#dots3)"/>

  <text x="60" y="52" font-family="Courier New, monospace" font-size="11" letter-spacing="3" fill="#8A8275">FIG. 02  //  THE FORK</text>
  <text x="60" y="90" font-family="Georgia, serif" font-style="italic" font-size="30" fill="#1C1B19">Three questions before you type.</text>
  <text x="60" y="122" font-family="Georgia, serif" font-size="17" fill="#3A372F">Two or more yeses → open the spec doc first.</text>

  <!-- CARD 1 -->
  <rect x="60" y="160" width="350" height="220" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1" rx="6"/>
  <rect x="60" y="160" width="5" height="220" fill="#539091"/>
  <text x="90" y="200" font-family="Courier New, monospace" font-size="11" letter-spacing="3" fill="#8A8275">Q1</text>
  <text x="90" y="248" font-family="Georgia, serif" font-style="italic" font-size="24" fill="#1C1B19">Will anyone else</text>
  <text x="90" y="278" font-family="Georgia, serif" font-style="italic" font-size="24" fill="#1C1B19">read this?</text>
  <line x1="90" y1="298" x2="140" y2="298" stroke="#539091" stroke-width="2"/>
  <text x="90" y="328" font-family="Georgia, serif" font-size="14" fill="#3A372F">A client. A teammate.</text>
  <text x="90" y="348" font-family="Georgia, serif" font-size="14" fill="#3A372F">A reviewer. A future employer</text>
  <text x="90" y="368" font-family="Georgia, serif" font-size="14" fill="#3A372F">reading your repo.</text>

  <!-- CARD 2 -->
  <rect x="425" y="160" width="350" height="220" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1" rx="6"/>
  <rect x="425" y="160" width="5" height="220" fill="#539091"/>
  <text x="455" y="200" font-family="Courier New, monospace" font-size="11" letter-spacing="3" fill="#8A8275">Q2</text>
  <text x="455" y="248" font-family="Georgia, serif" font-style="italic" font-size="24" fill="#1C1B19">Will I read this</text>
  <text x="455" y="278" font-family="Georgia, serif" font-style="italic" font-size="24" fill="#1C1B19">in a month?</text>
  <line x1="455" y1="298" x2="505" y2="298" stroke="#539091" stroke-width="2"/>
  <text x="455" y="328" font-family="Georgia, serif" font-size="14" fill="#3A372F">If yes, the spec is a note</text>
  <text x="455" y="348" font-family="Georgia, serif" font-size="14" fill="#3A372F">to your future self, and</text>
  <text x="455" y="368" font-family="Georgia, serif" font-size="14" fill="#3A372F">that self will thank you.</text>

  <!-- CARD 3 -->
  <rect x="790" y="160" width="350" height="220" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1" rx="6"/>
  <rect x="790" y="160" width="5" height="220" fill="#539091"/>
  <text x="820" y="200" font-family="Courier New, monospace" font-size="11" letter-spacing="3" fill="#8A8275">Q3</text>
  <text x="820" y="248" font-family="Georgia, serif" font-style="italic" font-size="24" fill="#1C1B19">Does this have to</text>
  <text x="820" y="278" font-family="Georgia, serif" font-style="italic" font-size="24" fill="#1C1B19">be defensible?</text>
  <line x1="820" y1="298" x2="870" y2="298" stroke="#539091" stroke-width="2"/>
  <text x="820" y="328" font-family="Georgia, serif" font-size="14" fill="#3A372F">A paper. A demo to a jury.</text>
  <text x="820" y="348" font-family="Georgia, serif" font-size="14" fill="#3A372F">A client deliverable.</text>
  <text x="820" y="368" font-family="Georgia, serif" font-size="14" fill="#3A372F">A number you'll be asked about.</text>
</svg>
