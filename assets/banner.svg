<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Arham Way — engineering notebook">
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1C1B19" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="#F4EEE2"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- editorial double frame -->
  <rect x="22" y="22" width="1156" height="256" fill="none" stroke="#1C1B19" stroke-width="1.5"/>
  <rect x="30" y="30" width="1140" height="240" fill="none" stroke="#1C1B19" stroke-width="0.6"/>

  <!-- faint blueprint crosshair (right side, asymmetric) -->
  <g transform="translate(1015,150)" stroke="#539091" fill="none" opacity="0.22">
    <circle r="92" stroke-width="1.2"/>
    <circle r="58" stroke-width="0.8"/>
    <line x1="-120" y1="0" x2="120" y2="0" stroke-width="0.8"/>
    <line x1="0" y1="-120" x2="0" y2="120" stroke-width="0.8"/>
  </g>

  <!-- top label -->
  <text x="64" y="84" font-family="'SF Mono', ui-monospace, 'Courier New', monospace"
        font-size="15" letter-spacing="6" fill="#8A8275">ENGINEERING NOTEBOOK · EST. 2026</text>

  <!-- title -->
  <text x="60" y="178" font-family="Georgia, 'Times New Roman', serif"
        font-size="86" font-style="italic" fill="#1C1B19">The Arham Way</text>

  <!-- accent rule -->
  <rect x="64" y="200" width="120" height="4" fill="#539091"/>

  <!-- tagline -->
  <text x="64" y="240" font-family="'SF Mono', ui-monospace, 'Courier New', monospace"
        font-size="17" letter-spacing="1" fill="#3A372F">How I build software &amp; hardware systems — principles · process · proof</text>
</svg>
