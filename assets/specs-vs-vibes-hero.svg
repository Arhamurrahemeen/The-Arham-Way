<svg role="img" aria-label="Two modes of building: vibe zone and spec zone, with the threshold triggers that move you between them" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620">
  <defs>
    <pattern id="dots2" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#1C1B19" fill-opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="620" fill="#F4EEE2"/>
  <rect width="1200" height="620" fill="url(#dots2)"/>

  <text x="60" y="52" font-family="Courier New, monospace" font-size="11" letter-spacing="3" fill="#8A8275">FIG. 01  //  THE TWO MODES</text>
  <text x="60" y="90" font-family="Georgia, serif" font-style="italic" font-size="30" fill="#1C1B19">One project, two modes of building.</text>
  <text x="60" y="122" font-family="Georgia, serif" font-size="17" fill="#3A372F">You start in one. The triggers below tell you when to switch.</text>

  <!-- LEFT CARD: VIBE MODE -->
  <rect x="60" y="160" width="510" height="380" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1" rx="6"/>
  <rect x="60" y="160" width="5" height="380" fill="#539091"/>

  <text x="90" y="200" font-family="Courier New, monospace" font-size="11" letter-spacing="3" fill="#8A8275">MODE A</text>
  <text x="90" y="238" font-family="Georgia, serif" font-style="italic" font-size="34" fill="#1C1B19">Vibe mode</text>

  <line x1="90" y1="258" x2="150" y2="258" stroke="#539091" stroke-width="2"/>

  <text x="90" y="290" font-family="Georgia, serif" font-size="15" fill="#3A372F">Fast start. Autocomplete-driven.</text>
  <text x="90" y="312" font-family="Georgia, serif" font-size="15" fill="#3A372F">Cheap to throw away. Learns as it goes.</text>

  <text x="90" y="352" font-family="Courier New, monospace" font-size="11" letter-spacing="2" fill="#8A8275">GOOD FOR</text>
  <text x="90" y="378" font-family="Georgia, serif" font-size="15" fill="#3A372F">• Throwaway scripts</text>
  <text x="90" y="400" font-family="Georgia, serif" font-size="15" fill="#3A372F">• Learning a new API</text>
  <text x="90" y="422" font-family="Georgia, serif" font-size="15" fill="#3A372F">• Weekend prototypes</text>
  <text x="90" y="444" font-family="Georgia, serif" font-size="15" fill="#3A372F">• Personal tools you'll rewrite anyway</text>

  <text x="90" y="484" font-family="Courier New, monospace" font-size="11" letter-spacing="2" fill="#8A8275">COST STRUCTURE</text>
  <text x="90" y="510" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#6E6A62">Cheap to start. Expensive to keep past the threshold.</text>

  <!-- RIGHT CARD: SPEC MODE -->
  <rect x="630" y="160" width="510" height="380" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1" rx="6"/>
  <rect x="630" y="160" width="5" height="380" fill="#539091"/>

  <text x="660" y="200" font-family="Courier New, monospace" font-size="11" letter-spacing="3" fill="#8A8275">MODE B</text>
  <text x="660" y="238" font-family="Georgia, serif" font-style="italic" font-size="34" fill="#1C1B19">Spec mode</text>

  <line x1="660" y1="258" x2="720" y2="258" stroke="#539091" stroke-width="2"/>

  <text x="660" y="290" font-family="Georgia, serif" font-size="15" fill="#3A372F">Slow start. Written before typed.</text>
  <text x="660" y="312" font-family="Georgia, serif" font-size="15" fill="#3A372F">Cheap to change. Survives handoff.</text>

  <text x="660" y="352" font-family="Courier New, monospace" font-size="11" letter-spacing="2" fill="#8A8275">GOOD FOR</text>
  <text x="660" y="378" font-family="Georgia, serif" font-size="15" fill="#3A372F">• Client work with real stakeholders</text>
  <text x="660" y="400" font-family="Georgia, serif" font-size="15" fill="#3A372F">• Multi-system architectures</text>
  <text x="660" y="422" font-family="Georgia, serif" font-size="15" fill="#3A372F">• Research with defensible claims</text>
  <text x="660" y="444" font-family="Georgia, serif" font-size="15" fill="#3A372F">• Anything you'll ship and maintain</text>

  <text x="660" y="484" font-family="Courier New, monospace" font-size="11" letter-spacing="2" fill="#8A8275">COST STRUCTURE</text>
  <text x="660" y="510" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#6E6A62">Expensive to start. Cheap for everything after.</text>

  <!-- THRESHOLD BAND -->
  <text x="60" y="582" font-family="Courier New, monospace" font-size="11" letter-spacing="3" fill="#8A8275">SWITCH MODE WHEN →</text>
  <text x="270" y="582" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#1C1B19">someone else will read it  //  two systems talk  //  claims must be defensible  //  it has to run the same way in two weeks</text>
</svg>
