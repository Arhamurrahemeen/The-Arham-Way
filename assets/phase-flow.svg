<svg viewBox="0 0 1200 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Five phases of starting a new project, with decision forks between each">
  <defs>
    <pattern id="pgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1C1B19" opacity="0.04"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1C1B19"/>
    </marker>
    <marker id="arrowback" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#B25C3F"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="540" fill="#F4EEE2"/>
  <rect width="1200" height="540" fill="url(#pgrid)"/>
  <rect x="12" y="12" width="1176" height="516" fill="none" stroke="#1C1B19" stroke-width="0.5" opacity="0.10"/>

  <!-- header -->
  <text x="40" y="50" font-family="'Courier New',monospace" font-size="11" letter-spacing="3" fill="#8A8275">THE FIVE PHASES</text>
  <text x="40" y="82" font-family="Georgia,serif" font-size="26" font-style="italic" fill="#1C1B19">From idea to a thing that survives users</text>
  <rect x="40" y="98" width="80" height="3" fill="#539091"/>

  <!-- legend -->
  <g transform="translate(820,55)" font-family="'Courier New',monospace" font-size="11" fill="#3A372F">
    <line x1="0" y1="0" x2="36" y2="0" stroke="#1C1B19" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="46" y="4">advance</text>
    <line x1="160" y1="0" x2="196" y2="0" stroke="#B25C3F" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowback)"/>
    <text x="206" y="4">go back</text>
  </g>

  <!-- ───────────────────────────── PHASE CARDS ───────────────────────────── -->
  <!-- Row of 5 cards: y=150, height=120, gap with forks between -->
  <!-- card width 200, gap 50; total = 5*200 + 4*50 = 1200 - too wide; use 180 + 45 gap = 5*180+4*45=1080, margin 60 each side -->

  <!-- Phase 1 — Conviction -->
  <g transform="translate(60,150)">
    <rect width="180" height="120" rx="6" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1"/>
    <rect width="5" height="120" fill="#539091"/>
    <text x="18" y="28" font-family="'Courier New',monospace" font-size="10" letter-spacing="2.5" fill="#8A8275">PHASE 01</text>
    <text x="18" y="58" font-family="Georgia,serif" font-size="22" font-style="italic" fill="#1C1B19">Conviction</text>
    <text x="18" y="86" font-family="'Courier New',monospace" font-size="11" fill="#6E6A62">Is this worth</text>
    <text x="18" y="102" font-family="'Courier New',monospace" font-size="11" fill="#6E6A62">a month of you?</text>
  </g>

  <!-- Phase 2 — Blueprint -->
  <g transform="translate(285,150)">
    <rect width="180" height="120" rx="6" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1"/>
    <rect width="5" height="120" fill="#539091"/>
    <text x="18" y="28" font-family="'Courier New',monospace" font-size="10" letter-spacing="2.5" fill="#8A8275">PHASE 02</text>
    <text x="18" y="58" font-family="Georgia,serif" font-size="22" font-style="italic" fill="#1C1B19">Blueprint</text>
    <text x="18" y="86" font-family="'Courier New',monospace" font-size="11" fill="#6E6A62">A spec sharp</text>
    <text x="18" y="102" font-family="'Courier New',monospace" font-size="11" fill="#6E6A62">enough to hand off</text>
  </g>

  <!-- Phase 3 — Surface -->
  <g transform="translate(510,150)">
    <rect width="180" height="120" rx="6" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1"/>
    <rect width="5" height="120" fill="#539091"/>
    <text x="18" y="28" font-family="'Courier New',monospace" font-size="10" letter-spacing="2.5" fill="#8A8275">PHASE 03</text>
    <text x="18" y="58" font-family="Georgia,serif" font-size="22" font-style="italic" fill="#1C1B19">Surface</text>
    <text x="18" y="86" font-family="'Courier New',monospace" font-size="11" fill="#6E6A62">Make it visible</text>
    <text x="18" y="102" font-family="'Courier New',monospace" font-size="11" fill="#6E6A62">before it's real</text>
  </g>

  <!-- Phase 4 — Skeleton -->
  <g transform="translate(735,150)">
    <rect width="180" height="120" rx="6" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1"/>
    <rect width="5" height="120" fill="#539091"/>
    <text x="18" y="28" font-family="'Courier New',monospace" font-size="10" letter-spacing="2.5" fill="#8A8275">PHASE 04</text>
    <text x="18" y="58" font-family="Georgia,serif" font-size="22" font-style="italic" fill="#1C1B19">Skeleton</text>
    <text x="18" y="86" font-family="'Courier New',monospace" font-size="11" fill="#6E6A62">Hardest part,</text>
    <text x="18" y="102" font-family="'Courier New',monospace" font-size="11" fill="#6E6A62">end to end</text>
  </g>

  <!-- Phase 5 — Stress -->
  <g transform="translate(960,150)">
    <rect width="180" height="120" rx="6" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1"/>
    <rect width="5" height="120" fill="#539091"/>
    <text x="18" y="28" font-family="'Courier New',monospace" font-size="10" letter-spacing="2.5" fill="#8A8275">PHASE 05</text>
    <text x="18" y="58" font-family="Georgia,serif" font-size="22" font-style="italic" fill="#1C1B19">Stress</text>
    <text x="18" y="86" font-family="'Courier New',monospace" font-size="11" fill="#6E6A62">Break it before</text>
    <text x="18" y="102" font-family="'Courier New',monospace" font-size="11" fill="#6E6A62">users do</text>
  </g>

  <!-- ───────────────────────────── ADVANCE ARROWS ───────────────────────────── -->
  <!-- Connect phases left-to-right at y=210 (mid-card) -->
  <g stroke="#1C1B19" stroke-width="1.5" fill="none">
    <line x1="240" y1="210" x2="280" y2="210" marker-end="url(#arrow)"/>
    <line x1="465" y1="210" x2="505" y2="210" marker-end="url(#arrow)"/>
    <line x1="690" y1="210" x2="730" y2="210" marker-end="url(#arrow)"/>
    <line x1="915" y1="210" x2="955" y2="210" marker-end="url(#arrow)"/>
  </g>

  <!-- ───────────────────────────── FORK LABELS (above arrows) ───────────────────────────── -->
  <g font-family="'Courier New',monospace" font-size="10" fill="#3A372F" text-anchor="middle">
    <text x="260" y="195">conviction?</text>
    <text x="485" y="195">specific?</text>
    <text x="710" y="195">do they get it?</text>
    <text x="935" y="195">e2e works?</text>
  </g>

  <!-- ───────────────────────────── GO-BACK CURVES ───────────────────────────── -->
  <!-- Curved dashed orange arcs going right-to-left below the cards -->
  <g stroke="#B25C3F" stroke-width="1.2" fill="none" stroke-dasharray="5,3">
    <path d="M 375 270 Q 262 360, 150 270" marker-end="url(#arrowback)"/>
    <path d="M 600 270 Q 487 360, 375 270" marker-end="url(#arrowback)"/>
    <path d="M 825 270 Q 712 360, 600 270" marker-end="url(#arrowback)"/>
    <path d="M 1050 270 Q 937 360, 825 270" marker-end="url(#arrowback)"/>
  </g>

  <!-- ───────────────────────────── BOTTOM CAPTION ───────────────────────────── -->
  <g transform="translate(60,420)">
    <text font-family="'Courier New',monospace" font-size="10" letter-spacing="3" fill="#8A8275">THE FORK LOGIC</text>
    <text y="32" font-family="Georgia,serif" font-size="18" font-style="italic" fill="#1C1B19">Each phase ends with one question.</text>
    <text y="58" font-family="Georgia,serif" font-size="14" fill="#3A372F">If you have evidence to advance, advance. If you don't, drop back one phase —</text>
    <text y="76" font-family="Georgia,serif" font-size="14" fill="#3A372F">never sit on a fork. Stuck for more than a day = wrong phase, not weak effort.</text>
  </g>

  <!-- footer signature -->
  <text x="1140" y="510" font-family="'Courier New',monospace" font-size="10" letter-spacing="2" fill="#8A8275" text-anchor="end">THE ARHAM WAY · PLAYBOOKS</text>
</svg>
